# Huragok — local pricing table (ADR-0002 D4)
#
# Used for real-time dollar estimates during session execution. Operator-
# maintained: update the `updated:` date and model entries when Anthropic
# ships pricing changes. Missing models cause the daemon to refuse to
# start, not silent zero-dollar accounting.
#
# Operators who want authoritative totals (vs. table estimates) can
# provision ANTHROPIC_ADMIN_API_KEY; the Budget Tracker then reconciles
# against /v1/organizations/cost_report at session end. Without the
# admin key, table drift is the known cost of staying simple.

